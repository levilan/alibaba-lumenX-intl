server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Timeouts for long-running AI generation requests (up to 5 min)
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # Static frontend files (SPA fallback)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Backend API — single regex block covers all API prefixes
    location ~ ^/(projects|series|tasks|art_direction|upload|video|voices|config|docs|openapi\.json|files|system|debug|library) {
        proxy_pass http://backend:17177;
        client_max_body_size 200M;
        proxy_buffering off;
    }
}
